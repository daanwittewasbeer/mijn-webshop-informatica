<!DOCTYPE html>
<html lang="nl">
<title> Webshop homepage </title>
<head>
<style>

.scroll-down {
    position: fixed; 
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    
    font-size: 35px;
    color: white;
    background-color: rgba(0, 0, 0, 0.5);

    padding: 10px 15px;
    border-radius: 50%;

    cursor: pointer;
    z-index: 999;

    animation: bounce 2.5s infinite;

    transition: opacity 0.3s ease;
}

@keyframes bounce {
    0%, 100% {
        transform: translateX(-50%) translateY(10px);
    }
    50% {
        transform: translateX(-50%) translateY(20px);
    }
}

.zoekbalk {
    position: absolute;
    z-index: 10;
    top: 420px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid black; /* dikke zwarte rand */
    border-radius: 50px;
    padding: 5px; /* optioneel, zodat inhoud niet tegen de rand zit */
    background-color: rgb(207, 245, 255);
}

.zoekbalk input {
    padding: 10px;
    width: 250px;
    font-size: 16px;
    border-radius: 50px; 
    border: 2px solid black; /* dikke rand om input zelf */
    outline: none;
}

.zoekbalk button {
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 50px;
    border: 2px solid black; /* dikke rand om knop */
    outline: none;
}

.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    width: 200px;
    padding: 10px;

    border: 2px solid black;
    border-radius: 15px;

    text-decoration: none;
    color: black;
    font-weight: bold;

    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px);  /* kaart komt omhoog */
    box-shadow: 0 0 35px 15px rgba(164, 232, 255, 0.8); /* grotere blauwe gloed */
    transition: all 0.3s ease;
}

/* Afbeeldingen in cards */
.card img {
    width: 150px;
    height: auto;
    margin-bottom: 10px;
}

.card-div {
    display: flex;
    justify-content: center; /* centreert alles */
    gap: 40px; /* ruimte tussen kaarten */
    margin-top: 300px
}

/* Specifieke posities + achtergrond */
.airbus {
    background-image: url("img_webshop/fransevlag.webp");
    z-index: 11;
}

.boeing {
    background-image: url("img_webshop/amerikaansevlag.avif");
    background-size: 225px 175px;
    z-index: 1;
}

.mcdonalds {
    background-image: url("img_webshop/amerikaansevlag.avif");
    background-size: 225px 175px;
    z-index: 21;
    font-size: 90%;
}

.label {
    background-color: rgba(255, 255, 255, 0.8); /* licht transparant */
    padding: 5px 10px;
    border-radius: 8px;
}
.cart-button {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0, 110, 147, 0.9);
    color: white;
    text-decoration: none;
    padding: 12px 20px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 1000;
    display: inline-flex;
    align-items: center;
    transition: all 0.3s ease;
}

.login-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 8px;
    border: 1px solid rgba(255,255,255,0.7);
    flex-shrink: 0;
}

.cart-button:hover {
    background: rgb(0, 140, 190);
    transform: scale(1.08);
    box-shadow: 0 0 20px rgba(0, 140, 190, 0.8);
}

</style>
</head>
<body>
<a href="registreren2.html" class="cart-button" id="login-button">
    Registreren/Inloggen
</a>
<a href="winkelmand.html" class="cart-button" style="margin-top: 50px;">
    winkelwagen
</a>
<a href="veiling.html" class="cart-button" style="margin-top: 100px;">
    veiling
</a>
<div style="position:relative; width: 100%; height:500px; margin:auto;">

    <img src="img_webshop/luchtachtergrond.jpg" alt="lucht" 
         style="width:100%; height:100%; display:block;">

    <img src="img_webshop/logo.png" alt="logo" 
         style="position:absolute; top:50px; left:50%; transform:translateX(-50%);
                width:500px; height:300px;">

         <img src="img_webshop/wolkachtergrond.png" alt="wolken" 
         style="position: absolute; top:0; left:0; width:100%; height:auto; margin-top: -23%;">

    <div class="scroll-down" onclick="scrollToCards()">
    ↓
</div>
</div>
<div class="card-div">
<a href="airbus.html" class="card airbus">
    <img src="img_webshop/airbus.png" alt="Airbus modellen">
    <span class="label">  Airbus modellen </span>
</a>

<a href="boeing.html" class="card boeing">
    <img src="img_webshop/boeing.jpeg" alt="Boeing modellen">
    <span class="label">  Boeing modellen </span>
</a>

<a href="mcdonalds.html" class="card mcdonalds">
    <img src="img_webshop/mcdonalds.jpg" alt="mcdonald douglas modellen">
    <span class="label"> Mcdonald douglas modellen </span>
</a>
</div>

<script type="module" src="script.js">
function scrollToCards() {
    document.querySelector('.card-div').scrollIntoView({
        behavior: 'smooth'
    });
}

window.addEventListener("scroll", function() {
    const arrow = document.querySelector(".scroll-down");

    const scrollPosition = window.innerHeight + window.scrollY;
    const pageHeight = document.body.offsetHeight;

    // Als je bijna onderaan bent (100px marge)
    if (scrollPosition >= pageHeight - 100) {
        arrow.style.opacity = "0";
        arrow.style.pointerEvents = "none";
    } else {
        arrow.style.opacity = "1";
        arrow.style.pointerEvents = "auto";
    }
});

const products = [
    {
        name: "Airbus mode",
        price: 50
    },
    {
        name: "Boeing model",
        price: 60
    },
    {
        name: "McDonald Douglas model",
        price: 55
    }
];

window.addEventListener("DOMContentLoaded", () => {

    const loginButton = document.getElementById("login-button");

    const currentName = localStorage.getItem("currentName");

    if (currentName) {
        loginButton.innerHTML = `👤 ${currentName}`;
        loginButton.href = "registreren.html";
    }

});



</script>
</body>
</html>
