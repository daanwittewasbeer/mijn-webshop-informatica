<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Gewonnen Veilingen – Kamervliegers</title>
<link rel="icon" type="image/png" href="img_webshop/tablogo.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f0f7fc;
  min-height: 100vh;
}

.bar {
  background: #094f78;
  color: rgba(255,255,255,.7);
  padding: 6px 20px;
  font-size: 12px;
  text-align: center;
}

.topbar { background: #fff; border-bottom: 1px solid #d1e7f5; }
.topbar ul {
  list-style: none;
  display: flex;
  justify-content: center;
  gap: 28px;
  padding: 11px 0;
}
.topbar a {
  text-decoration: none;
  color: #0e7ab5;
  font-size: 13px;
  font-weight: 500;
}
.topbar a:hover { color: #094f78; }

.hero {
  background: url("img_webshop/luchtachtergrond.jpg") center/cover;
  position: relative;
  color: #fff;
  padding: 50px 20px 40px;
  text-align: center;
}
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(9,79,120,0.65);
}
.hero > * { position: relative; z-index: 1; }
.hero h1 { font-size: 28px; margin-bottom: 6px; }
.hero p  { font-size: 13px; opacity: .8; }

.content {
  max-width: 860px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

/* Win card */
.win-card {
  background: #fff;
  border: 1px solid #d1e7f5;
  border-radius: 14px;
  margin-bottom: 20px;
  overflow: hidden;
  box-shadow: 0 2px 10px rgba(0,0,0,.06);
}

.win-card-header {
  display: flex;
  gap: 18px;
  padding: 20px;
  align-items: flex-start;
}

.win-card-img {
  width: 110px;
  height: 90px;
  object-fit: contain;
  background: #f0f7fc;
  border-radius: 8px;
  border: 1px solid #e8f2fa;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
}
.win-card-img img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 8px;
}

.win-card-info { flex: 1; }
.win-card-info h3 { color: #094f78; font-size: 16px; margin-bottom: 4px; }
.win-card-info .meta { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
.win-card-info .desc { font-size: 13px; color: #374151; line-height: 1.5; margin-bottom: 10px; }
.win-price { font-size: 24px; font-weight: 700; color: #094f78; }

/* Deadline bar */
.deadline-bar {
  border-top: 1px solid #e8f2fa;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.deadline-bar.ok   { background: #f0fdf4; }
.deadline-bar.warn { background: #fffbeb; }
.deadline-bar.bad  { background: #fef2f2; }

.deadline-text {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
}
.deadline-text.ok   { color: #065f46; }
.deadline-text.warn { color: #92400e; }
.deadline-text.bad  { color: #991b1b; }

.deadline-countdown {
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
}

/* Buttons */
.checkout-btn {
  background: #0e7ab5;
  color: #fff;
  border: none;
  padding: 11px 24px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: background .2s;
}
.checkout-btn:hover { background: #094f78; }

.expired-note {
  font-size: 12px;
  color: #6b7280;
  font-style: italic;
  padding: 0 20px 14px;
}

/* Doorgeschoven badge */
.passed-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #fef3c7;
  color: #78350f;
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
}

/* Empty */
.empty-card {
  background: #fff;
  border: 1px solid #d1e7f5;
  border-radius: 14px;
  padding: 60px 20px;
  text-align: center;
  color: #9ca3af;
  font-size: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.empty-card .icon { font-size: 48px; margin-bottom: 14px; }

.not-logged {
  background: #fff;
  border: 1px solid #fde68a;
  border-radius: 14px;
  padding: 40px 20px;
  text-align: center;
  color: #78350f;
  font-size: 14px;
}
.not-logged a {
  color: #0e7ab5;
  font-weight: 700;
  text-decoration: none;
}
</style>
</head>
<body>

<div class="bar">✦ Kamervliegers – Mijn gewonnen veilingen</div>

<nav class="topbar">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="veiling.html">← Terug naar veiling</a></li>
    <li><a href="winkelmand.html">🛒 Winkelmand</a></li>
  </ul>
</nav>

<div class="hero">
  <h1>🏆 Mijn Gewonnen Veilingen</h1>
  <p>Je hebt 48 uur om te betalen na het winnen van een veiling.</p>
</div>

<div class="content">
  <div id="wins-container"></div>
</div>

<script>
const currentUser = localStorage.getItem('currentUser') || localStorage.getItem('currentName') || null;

function getAuctions() {
  try { return JSON.parse(localStorage.getItem('kv_auctions') || '[]'); } catch(e) { return []; }
}
function saveAuctions(a) { localStorage.setItem('kv_auctions', JSON.stringify(a)); }

// Geef de 2e hoogste bieder terug (andere gebruiker dan huidige winnaar)
function getSecondBidder(a) {
  if (!a.bidHistory || a.bidHistory.length === 0) return null;
  // Zoek het hoogste bod van iemand anders dan de huidige winnaar
  const others = a.bidHistory
    .filter(b => b.user !== a.winner)
    .sort((x, y) => y.amount - x.amount);
  return others.length > 0 ? others[0] : null;
}

// Verval de betaaltermijn: schuif door naar 2e bieder of sluit definitief
function expireWinner(auctionId) {
  const auctions = getAuctions();
  const a = auctions.find(x => x.id === auctionId);
  if (!a) return;

  const second = getSecondBidder(a);

  if (second) {
    // Doorschuiven naar 2e bieder
    a.prevWinner = a.winner;  // bewaren voor logging
    a.winner = second.user;
    a.currentBid = second.amount;
    a.highBidder = second.user;
    a.paymentDeadline = Date.now() + 48 * 60 * 60 * 1000;
    a.passedDown = true;
  } else {
    // Geen 2e bieder — veiling definitief gesloten zonder winnaar
    a.winner = null;
    a.paymentDeadline = null;
    a.noWinner = true;
  }

  saveAuctions(auctions);
  render(); // herlaad de pagina-inhoud
}

function formatCountdown(ms) {
  if (ms <= 0) return '00:00:00';
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function goToCheckout(auctionId) {
  const auctions = getAuctions();
  const a = auctions.find(x => x.id === auctionId);
  if (!a) return;

  let cart = [];
  try { cart = JSON.parse(localStorage.getItem('kamervliegers_cart') || '[]'); } catch(e) {}

  // Niet dubbel toevoegen
  const already = cart.find(x => x.id === a.id);
  if (already) {
    alert('Dit item zit al in je winkelmand.');
    window.location.href = 'winkelmand.html';
    return;
  }

  cart.push({
    id: a.id,
    name: a.name,
    price: parseFloat(a.currentBid),
    img: a.img || '',
    qty: 1,
    auctionWinner: true
  });

  localStorage.setItem('kamervliegers_cart', JSON.stringify(cart));
  window.location.href = 'winkelmand.html';
}

function render() {
  const box = document.getElementById('wins-container');

  if (!currentUser) {
    box.innerHTML = `<div class="not-logged">
      Je moet ingelogd zijn om je gewonnen veilingen te zien.<br><br>
      <a href="registreren2.html">Inloggen / Registreren →</a>
    </div>`;
    return;
  }

  const auctions = getAuctions();
  const wins = auctions.filter(a => a.winner === currentUser);

  if (wins.length === 0) {
    box.innerHTML = `<div class="empty-card">
      <div class="icon">🏆</div>
      Je hebt nog geen veilingen gewonnen.<br>
      <a href="veiling.html" style="color:#0e7ab5;font-weight:700;text-decoration:none">Ga bieden →</a>
    </div>`;
    return;
  }

  box.innerHTML = wins.map(a => {
    const now      = Date.now();
    const deadline = a.paymentDeadline || null;
    const msLeft   = deadline ? deadline - now : null;
    const expired  = msLeft !== null && msLeft <= 0;

    // Afbeelding of emoji
    const imgHTML = a.img
      ? `<img src="${a.img}" alt="${a.name}">`
      : `<span>${a.emoji || '✈'}</span>`;

    // Doorgeschoven badge (was eerder 2e bieder)
    const passedBadge = a.passedDown
      ? `<span class="passed-badge">⚠ Vorige winnaar betaalde niet op tijd</span><br><br>`
      : '';

    // Deadline sectie
    let deadlineHTML = '';
    if (!deadline) {
      deadlineHTML = `
        <div class="deadline-bar ok">
          <div class="deadline-text ok">✅ Geen betalingstermijn</div>
          <button class="checkout-btn" onclick="goToCheckout(${a.id})">🛒 In winkelmand</button>
        </div>`;
    } else if (expired) {
      deadlineHTML = `
        <div class="deadline-bar bad">
          <div class="deadline-text bad">❌ Betaaltermijn verlopen</div>
        </div>
        <div class="expired-note">Dit item is doorgeschoven naar de volgende bieder.</div>`;
    } else {
      const urgency = msLeft < 4 * 3600 * 1000 ? 'warn' : 'ok';
      const icon    = urgency === 'warn' ? '⚠️' : '⏳';
      deadlineHTML = `
        <div class="deadline-bar ${urgency}">
          <div class="deadline-text ${urgency}">
            ${icon} Betaal binnen:
            <span class="deadline-countdown" id="cd-${a.id}">${formatCountdown(msLeft)}</span>
          </div>
          <button class="checkout-btn" onclick="goToCheckout(${a.id})">🛒 In winkelmand</button>
        </div>`;
    }

    return `
      <div class="win-card" id="win-${a.id}">
        <div class="win-card-header">
          <div class="win-card-img">${imgHTML}</div>
          <div class="win-card-info">
            ${passedBadge}
            <h3>${a.name}</h3>
            <div class="meta">${a.scale ? a.scale + ' · ' : ''}${a.brand || ''}</div>
            <div class="desc">${a.description || ''}</div>
            <div class="win-price">€${parseFloat(a.currentBid).toFixed(2)}</div>
          </div>
        </div>
        ${deadlineHTML}
      </div>`;
  }).join('');
}

// Live countdown — elke seconde
function tick() {
  const auctions = getAuctions();
  const wins = auctions.filter(a => a.winner === currentUser);

  wins.forEach(a => {
    const el = document.getElementById('cd-' + a.id);
    if (!el || !a.paymentDeadline) return;

    const msLeft = a.paymentDeadline - Date.now();

    if (msLeft <= 0) {
      // Termijn zojuist verlopen → verwerk doorschuiving en herrender
      expireWinner(a.id);
      return;
    }

    el.textContent = formatCountdown(msLeft);

    // Kleur aanpassen als het spannend wordt
    const bar = el.closest('.deadline-bar');
    if (bar && msLeft < 4 * 3600 * 1000) {
      bar.classList.remove('ok');
      bar.classList.add('warn');
      const txt = bar.querySelector('.deadline-text');
      if (txt) { txt.classList.remove('ok'); txt.classList.add('warn'); }
    }
  });
}

render();
setInterval(tick, 1000);
</script>

</body>
</html>
